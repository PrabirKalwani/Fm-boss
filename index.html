<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Silico Essential India — Financial Report</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0D0F12;color:#E8EAF0;font-family:Georgia,'Times New Roman',serif;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#0D0F12}
::-webkit-scrollbar-thumb{background:#1E2640;border-radius:2px}
button{font-family:inherit;cursor:pointer}

#app{display:flex;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto;position:relative;background:#0D0F12}

/* TOP BAR */
#topbar{background:#0A0C0F;border-bottom:1px solid #1A1E28;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
#topbar-left .label{font-size:9px;letter-spacing:.12em;color:#445;font-family:monospace;text-transform:uppercase}
#topbar-left .title{font-size:13px;font-weight:bold;color:#E8EAF0;margin-top:1px}
#topbar-right{display:flex;align-items:center;gap:10px}
#step-counter{font-size:18px;font-weight:bold;font-family:monospace}
#step-counter span{color:#334;font-size:12px}
#menu-btn{background:transparent;border:1px solid #1E2640;border-radius:6px;padding:6px 10px;color:#889;font-size:15px;line-height:1;transition:background .2s}
#menu-btn.open{background:#1A2030}

/* PROGRESS */
#progress-track{height:2px;background:#1A1E28;flex-shrink:0}
#progress-bar{height:100%;width:0%;transition:width .35s ease,background .3s ease}

/* DRAWER */
#drawer{display:none;position:fixed;top:57px;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#0A0C0F;z-index:40;border-bottom:1px solid #1E2330;max-height:65vh;overflow-y:auto}
#drawer.open{display:block}
.drawer-item{display:flex;align-items:center;width:100%;padding:12px 16px;background:transparent;border:none;border-bottom:1px solid #111520;cursor:pointer;gap:12px;text-align:left;border-left:3px solid transparent;transition:background .15s}
.drawer-item.active{background:#141820}
.drawer-num{width:24px;height:24px;border-radius:50%;flex-shrink:0;background:#141820;display:flex;align-items:center;justify-content:center;font-size:9px;font-family:monospace;font-weight:bold;color:#445;transition:background .2s,color .2s}
.drawer-item-title{font-size:12px;color:#667;font-family:monospace}
.drawer-item-tag{font-size:9px;font-family:monospace;letter-spacing:.08em;margin-top:2px;color:#334;text-transform:uppercase}

/* CONTENT */
#content{flex:1;overflow-y:auto;padding:20px 16px 100px}

/* STEP HEADER */
.step-tag{font-size:9px;letter-spacing:.14em;font-family:monospace;text-transform:uppercase;padding:3px 8px;border-radius:3px;display:inline-block}
.step-title{font-size:22px;font-weight:bold;color:#E8EAF0;margin:10px 0 5px;letter-spacing:-.02em;line-height:1.2}
.step-summary{font-size:13px;color:#778;font-style:italic}
.step-rule{width:32px;height:2px;margin-top:14px;border-radius:1px}

/* BLOCKS */
.block-para{font-size:14px;color:#B0B8C8;line-height:1.75;margin:0 0 16px}
.block-list{margin:0 0 18px}
.list-item{padding:10px 12px;margin-bottom:7px;background:#111520;border-radius:0 6px 6px 0;font-size:13px;color:#C0C8D8;line-height:1.6}
.block-table-wrap{margin:0 0 20px;border-radius:8px;border:1px solid #1E2330;overflow-x:auto}
.block-table{width:100%;border-collapse:collapse;font-size:11.5px;font-family:monospace}
.block-table th{padding:9px 10px;background:#111520;font-weight:bold;font-size:9px;letter-spacing:.09em;text-transform:uppercase;white-space:nowrap}
.block-table th:first-child{text-align:left}
.block-table th:not(:first-child){text-align:center}
.block-table td{padding:8px 10px;border-bottom:1px solid #141820;white-space:nowrap}
.block-table td:first-child{color:#C8D0E0;text-align:left}
.block-table td:not(:first-child){color:#9AA4B8;text-align:center}
.block-table tr:nth-child(even){background:#0F1218}
.block-table tr:nth-child(odd){background:#0D0F12}
.block-insight{margin:20px 0 6px;padding:13px 14px;border-radius:8px}
.insight-label{font-size:8px;letter-spacing:.14em;font-family:monospace;text-transform:uppercase;margin-bottom:5px}
.insight-text{font-size:13px;color:#C8D4E8;line-height:1.7;font-style:italic}
.chart-block{margin:0 0 18px;padding:14px;border-radius:8px;background:#111520;border:1px solid #1E2330}
.chart-title{font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-family:monospace;margin-bottom:10px}
.chart-row{display:grid;grid-template-columns:92px 1fr auto;gap:8px;align-items:center;margin-bottom:8px}
.chart-row:last-child{margin-bottom:0}
.chart-label{font-size:11px;color:#9AA4B8;font-family:monospace}
.chart-track{height:10px;background:#0D0F12;border:1px solid #1A1E28;border-radius:999px;overflow:hidden}
.chart-fill{height:100%;border-radius:999px;min-width:2px}
.chart-value{font-size:11px;color:#C8D0E0;font-family:monospace}

/* BOTTOM NAV */
#bottomnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#0A0C0F;border-top:1px solid #1A1E28;padding:10px 16px;display:flex;align-items:center;gap:10px;z-index:30}
#btn-prev,#btn-next{padding:11px 18px;border-radius:8px;font-size:14px;font-family:monospace;font-weight:bold;flex-shrink:0;transition:background .2s,color .2s}
#btn-prev{border:1px solid #1E2640;background:#141C2A;color:#889}
#btn-prev:disabled{background:#111520;color:#2A3040;cursor:default}
#btn-next{border:none}
#dots{flex:1;display:flex;align-items:center;justify-content:center;gap:4px;flex-wrap:wrap}
.dot{height:6px;border-radius:3px;border:none;padding:0;cursor:pointer;flex-shrink:0;transition:all .25s ease;background:#1A1E28}

/* DESKTOP */
@media (min-width: 992px){
  #app{
    max-width:1200px;
    display:grid;
    grid-template-columns:320px 1fr;
    grid-template-rows:auto 2px 1fr auto;
    grid-template-areas:
      "top top"
      "progress progress"
      "drawer content"
      "drawer bottomnav";
    border-left:1px solid #1A1E28;
    border-right:1px solid #1A1E28;
  }

  #topbar{grid-area:top;position:static;padding:14px 20px}
  #progress-track{grid-area:progress}

  #drawer{
    grid-area:drawer;
    display:block;
    position:static;
    top:auto;
    left:auto;
    transform:none;
    width:100%;
    max-width:none;
    max-height:none;
    border-right:1px solid #1E2330;
    border-bottom:none;
  }

  #drawer.open{display:block}

  #content{
    grid-area:content;
    padding:28px 28px 24px;
  }

  #bottomnav{
    grid-area:bottomnav;
    position:static;
    left:auto;
    transform:none;
    width:100%;
    max-width:none;
    padding:12px 20px;
  }

  #menu-btn{display:none}
  .step-title{font-size:28px}
  .block-table{font-size:13px}
}
</style>

</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="topbar-left">
      <div class="label">Silico Essential India</div>
      <div class="title" id="tb-title"></div>
    </div>
    <div id="topbar-right">
      <div id="step-counter"></div>
      <button id="menu-btn">☰</button>
    </div>
  </div>
  <div id="progress-track"><div id="progress-bar"></div></div>
  <div id="drawer"></div>
  <div id="content"></div>
  <div id="bottomnav">
    <button id="btn-prev">←</button>
    <div id="dots"></div>
    <button id="btn-next">→</button>
  </div>
</div>

<script>
const steps = [
  {
    id:"fm-overview",title:"FM Project Overview",tag:"FM Project",color:"#38BDF8",
    summary:"Financial management project dashboard and key outcomes",
    content:[
      {type:"para",text:"This FM project evaluates three investment plans for Silico Essential India and recommends the most value-creating option using core capital-budgeting metrics (NPV, IRR, PI, and Payback)."},
      {type:"chart",title:"Plan Comparison — NPV (₹ Cr)",max:65,data:[["Plan A",-1.11],["Plan B",21.03],["Plan C",62.63]]},
      {type:"chart",title:"Plan Comparison — IRR (%)",max:30,data:[["Plan A",14.48],["Plan B",23.54],["Plan C",28.02]]},
      {type:"insight",text:"Plan C leads on both value creation and return spread over WACC, which is why the report's final recommendation favors Plan C."}
    ]
  },
  {
    id:1,title:"Company at a Glance",tag:"Introduction",color:"#7EE8A2",
    summary:"What is Silico Essential India?",
    content:[
      {type:"para",text:"Silico Essential India is a B2B startup founded in January 2025 in Dholera SIR, Gujarat. Backed by Accel India, it manufactures Ultra-High Purity (UHP) Electronic-Grade Chemicals for semiconductor fabs — purified to Parts Per Trillion (PPT) levels."},
      {type:"table",headers:["Parameter","Detail"],rows:[["Founded","Jan 2025"],["Location","Dholera SIR, Gujarat"],["Backer","Accel India (VC)"],["Business","B2B Manufacturing"],["Clients","Tata, Micron, CG Power"]]},
      {type:"insight",text:"Think of Silico as the chemical backbone for India's chip-making ambitions. No chips get made without these chemicals."}
    ]
  },
  {
    id:2,title:"The Problem",tag:"Market Need",color:"#F6A623",
    summary:"Why does this business need to exist?",
    content:[
      {type:"para",text:"India is building massive chip fabs. Tata Electronics alone is investing ₹91,000 Cr in Dholera. Each fab needs huge daily volumes of ultra-pure chemicals. Currently, all of it is imported — creating three critical problems:"},
      {type:"list",items:["🕐 Lead Times — Imports take 6–8 weeks. Chemicals degrade in transit.","💸 Cost Premium — Import duties + logistics add 35–45% over local supply.","🌐 Supply Risk — Geopolitical shocks can halt fab operations entirely."]},
      {type:"table",headers:["Chemical","Daily Need","Purity"],rows:[["H₂SO₄","5,000–8,000 L","6N"],["H₂O₂","3,000–5,000 L","5N"],["NH₃","2,000–3,000 L","6N"],["HF","1,500–2,500 L","5N"]]},
      {type:"insight",text:"Silico's fix: build a cleanroom factory in Dholera itself — delivery drops from weeks to hours, cost drops 35–45%."}
    ]
  },
  {
    id:3,title:"Market Landscape",tag:"Industry",color:"#A78BFA",
    summary:"How big is the opportunity?",
    content:[
      {type:"para",text:"India's semiconductor market is on a hypergrowth path. The chemical segment alone triples from $2B to $6B by 2030."},
      {type:"table",headers:["Year","Total Mkt","Chem Seg"],rows:[["2024","$40B","$2B"],["2027","$65B","$3.5B"],["2030","$110B","$6B"]]},
      {type:"list",items:["🏛 Gujarat Policy: 40% CAPEX subsidy, subsidized land, power tariff cuts.","🇮🇳 ISM 2.0: Grants for chemical suppliers, low-interest SIDBI loans."]},
      {type:"insight",text:"Silico's TAM in Gujarat alone is ₹21.6 Cr/year — capturing just 20% of the local chemical market by 2030."}
    ]
  },
  {
    id:4,title:"Competition",tag:"Competitors",color:"#F87171",
    summary:"Who are the rivals and why can Silico win?",
    content:[
      {type:"para",text:"Global players (BASF, Merck, Solvay) have quality but suffer from 6–8 week lead times. Domestic companies (SRF, Guj. Fluorochemicals) have scale but lack semiconductor-grade purity lines."},
      {type:"table",headers:["Competitor","Strength","Weakness"],rows:[["BASF / Merck","High quality","6–8 wk delay"],["SRF / GFL","Massive scale","No UHP lines"],["Silico","Proximity + purity","New entrant"]]},
      {type:"list",items:["🏭 Greenfield: Built exclusively for semiconductor-grade purity.","📍 Proximity: Hours — not weeks — to Tata's fab.","🔒 First-mover: 12–18 month qualification locks in long-term contracts."]},
      {type:"insight",text:"Once Silico qualifies as a Tier-1 supplier, competitors need 12–18 months just to get certified — a durable moat."}
    ]
  },
  {
    id:5,title:"Three Investment Plans",tag:"Capital",color:"#34D399",
    summary:"How much is needed — and what's the difference?",
    content:[
      {type:"para",text:"The report evaluates three investment scenarios — from conservative to aggressive — each representing a different bet on India's semiconductor ramp-up speed."},
      {type:"table",headers:["","Plan A","Plan B","Plan C"],rows:[["Investment","₹65 Cr","₹75 Cr","₹120 Cr"],["Capacity","1,200 MT","1,500 MT","3,000 MT"],["Yr 1 Rev","₹10 Cr","₹12 Cr","₹15 Cr"],["Rev Growth","70%/yr","90%/yr","110%/yr"],["Salvage","₹6.5 Cr","₹7.5 Cr","₹12 Cr"]]},
      {type:"insight",text:"All plans use straight-line depreciation over 5 years. Plan C's annual depreciation of ₹21.60 Cr is a significant non-cash tax shield."}
    ]
  },
  {
    id:6,title:"Financing the Business",tag:"Sources of Finance",color:"#60A5FA",
    summary:"Where does the money come from?",
    content:[
      {type:"table",headers:["Source","Plan A","Plan B","Plan C"],rows:[["Accel India","₹35 Cr","₹40 Cr","₹60 Cr"],["Promoters","₹13.75 Cr","₹14.53 Cr","₹12 Cr"],["SIDBI Loan","₹12 Cr","₹15 Cr","₹35 Cr"],["Working Cap","₹4.25 Cr","₹5.47 Cr","₹13 Cr"],["Equity %","75%","72.7%","60%"],["Debt %","25%","27.3%","40%"]]},
      {type:"para",text:"The SIDBI loan is subsidized at 8.5–9% p.a. with an 18-month moratorium during construction. Government grants (40% CAPEX subsidy, land, power, stamp duty waiver) reduce net capital burden but are treated separately from debt/equity."},
      {type:"insight",text:"Plan C takes on more debt (40%) but benefits more from the debt tax shield — key to why it has the lowest cost of capital."}
    ]
  },
  {
    id:7,title:"Cost of Capital (WACC)",tag:"Capital Structure",color:"#FBBF24",
    summary:"What return does the business need to beat?",
    content:[
      {type:"para",text:"WACC is the minimum return needed to satisfy both equity investors and debt lenders. It's the hurdle rate — any project must earn more than this to create value."},
      {type:"para",text:"Formula: WACC = (E/V × Re) + (D/V × Rd × (1 – Tax Rate)). Debt is cheaper after-tax because interest is tax-deductible."},
      {type:"table",headers:["","Plan A","Plan B","Plan C"],rows:[["Cost of Equity","18%","18%","18%"],["Cost of Debt","8.5%","8.5%","9%"],["After-Tax Debt","6.38%","6.38%","6.75%"],["Equity Wt.","75%","72.7%","60%"],["Debt Wt.","25%","27.3%","40%"],["WACC","15.09%","14.83%","13.50% ✓"]]},
      {type:"insight",text:"Plan C's higher debt ratio means more financing from cheap after-tax debt (6.75%) vs. expensive equity (18%). This pushes WACC down to 13.50% — the lowest of all three plans."}
    ]
  },
  {
    id:8,title:"5-Year Projections",tag:"Financials",color:"#EC4899",
    summary:"How does money flow over time?",
    content:[
      {type:"table",headers:["Year","Plan A","Plan B","Plan C"],rows:[["Yr 1","₹10 Cr","₹12 Cr","₹15 Cr"],["Yr 2","₹17 Cr","₹22.8 Cr","₹31.5 Cr"],["Yr 3","₹28.9 Cr","₹43.3 Cr","₹66.2 Cr"],["Yr 4","₹49.1 Cr","₹82.3 Cr","₹138.9 Cr"],["Yr 5","₹83.5 Cr","₹156.4 Cr","₹291.7 Cr"]]},
      {type:"para",text:"CFAT = EAT + Depreciation + Salvage (Yr 5) − Initial Investment (Yr 0). Depreciation is added back because it's non-cash — it reduces taxable profit but no cash leaves the company."},
      {type:"table",headers:["Year","Plan C CFAT"],rows:[["Yr 0","−₹120.00 Cr"],["Yr 1","+₹22.16 Cr"],["Yr 2","+₹27.73 Cr"],["Yr 3","+₹39.43 Cr"],["Yr 4","+₹63.98 Cr"],["Yr 5","+₹127.56 Cr"]]},
      {type:"insight",text:"Year 1 EBITDA margins look unusually high (149% for Plan C) because ₹21.60 Cr depreciation dominates CFAT at low early revenues. Margins normalize as revenue scales."}
    ]
  },
  {
    id:9,title:"NPV Analysis",tag:"Capital Budgeting",color:"#6EE7B7",
    summary:"Does this project create value in today's money?",
    content:[
      {type:"para",text:"NPV discounts all future cash flows back to today using WACC. If discounted inflows exceed the initial investment, the project creates wealth. Formula: NPV = Σ [CFATₜ / (1 + WACC)ᵗ]"},
      {type:"table",headers:["Plan","PV Inflows","Investment","NPV",""],rows:[["Plan A","₹63.89 Cr","₹65 Cr","−₹1.11 Cr","❌"],["Plan B","₹96.03 Cr","₹75 Cr","+₹21.03 Cr","✅"],["Plan C","₹182.63 Cr","₹120 Cr","+₹62.63 Cr","⭐"]]},
      {type:"chart",title:"NPV by Plan (₹ Cr)",max:65,data:[["Plan A",-1.11],["Plan B",21.03],["Plan C",62.63]]},
      {type:"insight",text:"Plan C's NPV of ₹62.63 Cr means investing ₹120 Cr today creates ₹182.63 Cr of present value — a net gain of ₹62.63 Cr in today's rupees."}
    ]
  },
  {
    id:10,title:"IRR Analysis",tag:"Capital Budgeting",color:"#A5B4FC",
    summary:"What is the project's intrinsic annual return?",
    content:[
      {type:"para",text:"IRR is the discount rate at which NPV = 0. It's the annualized return the project generates. Rule: if IRR > WACC, the project earns more than it costs — accept it."},
      {type:"table",headers:["Plan","IRR","WACC","Spread",""],rows:[["Plan A","14.48%","15.09%","−0.61%","❌"],["Plan B","23.54%","14.83%","+8.71%","✅"],["Plan C","28.02%","13.50%","+14.52%","⭐"]]},
      {type:"chart",title:"IRR by Plan (%)",max:30,data:[["Plan A",14.48],["Plan B",23.54],["Plan C",28.02]]},
      {type:"para",text:"Plan C's IRR of 28.02% beats its WACC by 14.52 percentage points — the project generates returns nearly double its cost of capital."},
      {type:"insight",text:"Accel India typically targets 25–30% IRR for Series A bets. Plan C's 28.02% hits that mark exactly."}
    ]
  },
  {
    id:11,title:"PI, Payback & ARR",tag:"Capital Budgeting",color:"#FCA5A5",
    summary:"Three more ways to evaluate the investment",
    content:[
      {type:"list",items:["📊 PI = PV of Inflows ÷ Investment. PI > 1 = value-creating. Plan C: 1.522 → every ₹1 invested returns ₹1.52.","⏱ Simple Payback: Years to recover investment (undiscounted). Plan C: 3.35 years.","📅 Discounted Payback: Same but PV-adjusted. Plan C: 4.09 years — within the 5-year horizon.","📈 ARR: Average EAT ÷ Average Investment. Plan C: 48.75%. Good but ignores time value of money."]},
      {type:"table",headers:["Metric","Plan A","Plan B","Plan C"],rows:[["PI","0.983 ❌","1.280 ✅","1.522 ⭐"],["Simple PB","3.93 yr","3.47 yr","3.35 yr"],["Disc. PB","Never ❌","4.34 yr ✅","4.09 yr ⭐"],["ARR","17.44%","36.51%","48.75%"]]},
      {type:"insight",text:"Plan A passes simple payback and ARR but fails every discounted method — proving why ignoring time value of money is dangerous."}
    ]
  },
  {
    id:12,title:"Final Verdict",tag:"Conclusion",color:"#7EE8A2",
    summary:"What should be done — and why?",
    content:[
      {type:"para",text:"Every single DCF metric — NPV, IRR, PI, and Discounted Payback — unanimously recommends Plan C. The ₹120 Cr aggressive investment is the financially optimal choice."},
      {type:"table",headers:["Metric","Plan C","Verdict"],rows:[["NPV","₹62.63 Cr","Highest value"],["IRR","28.02%","+14.52pp vs WACC"],["PI","1.522","₹1.52 per ₹1"],["Simple PB","3.35 yrs","Fastest recovery"],["Disc. PB","4.09 yrs","Within horizon"],["ARR","48.75%","Best profitability"],["WACC","13.50%","Lowest cost"]]},
      {type:"para",text:"If raising ₹120 Cr proves difficult, Plan B (₹75 Cr) is a solid fallback with NPV ₹21.03 Cr and IRR 23.54%."},
      {type:"insight",text:"The big bet: Tata Electronics hits 50,000 wafers/month, and Silico is the first qualified domestic UHP chemical supplier standing in Gujarat when it does."}
    ]
  }
];

let current = 0;
const MIN_BAR_WIDTH_PERCENT = 2;

function color(){ return steps[current].color; }

function hexAlpha(hex, a){
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function renderDrawer(){
  const d = document.getElementById('drawer');
  d.innerHTML = '';
  steps.forEach((s,i)=>{
    const btn = document.createElement('button');
    btn.className = 'drawer-item' + (i===current?' active':'');
    btn.style.borderLeftColor = i===current ? s.color : 'transparent';
    const done = i < current;
    const numBg = i===current ? s.color : (done ? '#1E2640' : '#141820');
    const numColor = i===current ? '#0A0C0F' : (done ? '#60A5FA' : '#445');
    btn.innerHTML = `
      <div class="drawer-num" style="background:${numBg};color:${numColor}">${done?'✓':String(i+1).padStart(2,'0')}</div>
      <div>
        <div class="drawer-item-title" style="color:${i===current?'#E8EAF0':'#667'}">${s.title}</div>
        <div class="drawer-item-tag" style="color:${i===current?s.color:'#334'}">${s.tag.toUpperCase()}</div>
      </div>`;
    btn.addEventListener('click',()=>{ goTo(i); });
    d.appendChild(btn);
  });
}

function renderDots(){
  const container = document.getElementById('dots');
  container.innerHTML='';
  steps.forEach((s,i)=>{
    const dot = document.createElement('button');
    dot.className='dot';
    dot.style.width = i===current?'18px':'6px';
    dot.style.background = i===current ? color() : (i<current?'#2A3A50':'#1A1E28');
    dot.addEventListener('click',()=>goTo(i));
    container.appendChild(dot);
  });
}

function renderContent(){
  const s = steps[current];
  const c = document.getElementById('content');

  let html = `
    <div style="margin-bottom:20px">
      <span class="step-tag" style="color:${s.color};background:${hexAlpha(s.color,0.09)};border:1px solid ${hexAlpha(s.color,0.21)}">${s.tag}</span>
      <h1 class="step-title">${s.title}</h1>
      <div class="step-summary">${s.summary}</div>
      <div class="step-rule" style="background:${s.color}"></div>
    </div>`;

  s.content.forEach(block=>{
    if(block.type==='para'){
      html+=`<p class="block-para">${block.text}</p>`;
    }
    else if(block.type==='list'){
      html+='<div class="block-list">';
      block.items.forEach(item=>{
        html+=`<div class="list-item" style="border-left:3px solid ${hexAlpha(s.color,0.33)}">${item}</div>`;
      });
      html+='</div>';
    }
    else if(block.type==='table'){
      html+=`<div class="block-table-wrap"><table class="block-table"><thead><tr>`;
      block.headers.forEach(h=>{
        html+=`<th style="color:${s.color};border-bottom:1px solid ${hexAlpha(s.color,0.19)}">${h}</th>`;
      });
      html+=`</tr></thead><tbody>`;
      block.rows.forEach(row=>{
        html+=`<tr>`;
        row.forEach(cell=>{ html+=`<td>${cell}</td>`; });
        html+=`</tr>`;
      });
      html+=`</tbody></table></div>`;
    }
    else if(block.type==='insight'){
      html+=`
        <div class="block-insight" style="background:${hexAlpha(s.color,0.05)};border:1px solid ${hexAlpha(s.color,0.19)}">
          <div class="insight-label" style="color:${s.color}">KEY INSIGHT</div>
          <p class="insight-text">${block.text}</p>
        </div>`;
    }
    else if(block.type==='chart'){
      const max = block.max ?? Math.max(...block.data.map(d=>Math.abs(d[1])));
      const safeMax = max > 0 ? max : 1;
      html+=`<div class="chart-block"><div class="chart-title" style="color:${s.color}">${block.title||'Chart'}</div>`;
      block.data.forEach(([label,value])=>{
        let width = (Math.abs(value)/safeMax)*100;
        if(width>0){ width = Math.max(width, MIN_BAR_WIDTH_PERCENT); }
        html+=`
          <div class="chart-row">
            <div class="chart-label">${label}</div>
            <div class="chart-track">
              <div class="chart-fill" style="width:${width}%;background:${value<0?'#F87171':s.color}"></div>
            </div>
            <div class="chart-value">${value.toFixed(2)}</div>
          </div>`;
      });
      html+=`</div>`;
    }
  });

  c.innerHTML = html;
  c.scrollTop = 0;
}

function renderTopbar(){
  const s = steps[current];
  document.getElementById('tb-title').textContent = s.title;
  const sc = document.getElementById('step-counter');
  sc.style.color = s.color;
  sc.innerHTML = `${current+1}<span>/${steps.length}</span>`;
}

function renderProgress(){
  const bar = document.getElementById('progress-bar');
  bar.style.width = `${((current+1)/steps.length)*100}%`;
  bar.style.background = color();
}

function renderNav(){
  const prev = document.getElementById('btn-prev');
  const next = document.getElementById('btn-next');
  prev.disabled = current===0;
  next.disabled = current===steps.length-1;
  if(current===steps.length-1){
    next.style.background='#111520';
    next.style.color='#2A3040';
    next.style.cursor='default';
  } else {
    next.style.background=color();
    next.style.color='#0A0C0F';
    next.style.cursor='pointer';
  }
}

function render(){
  renderTopbar();
  renderProgress();
  renderContent();
  renderDots();
  renderNav();
  renderDrawer();
}

function goTo(i){
  current=i;
  closeMenu();
  render();
}

let menuOpen=false;
function closeMenu(){
  menuOpen=false;
  document.getElementById('drawer').classList.remove('open');
  const btn=document.getElementById('menu-btn');
  btn.textContent='☰';
  btn.classList.remove('open');
}

document.getElementById('menu-btn').addEventListener('click',()=>{
  menuOpen=!menuOpen;
  const btn=document.getElementById('menu-btn');
  const drawer=document.getElementById('drawer');
  if(menuOpen){
    drawer.classList.add('open');
    btn.textContent='✕';
    btn.classList.add('open');
    renderDrawer();
  } else {
    closeMenu();
  }
});

document.getElementById('btn-prev').addEventListener('click',()=>{ if(current>0){current--;render();} });
document.getElementById('btn-next').addEventListener('click',()=>{ if(current<steps.length-1){current++;render();} });

// Close drawer on outside tap
document.getElementById('content').addEventListener('click',()=>{ if(menuOpen)closeMenu(); });

render();
</script>

</body>
</html>
